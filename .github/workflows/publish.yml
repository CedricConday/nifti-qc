name: publish

# Publishes to PyPI via OIDC Trusted Publishing (no stored token) whenever a
# GitHub Release is published. Requires a one-time PyPI trusted-publisher config
# for project "nifti-qc": owner CedricConday, repo nifti-qc, workflow
# publish.yml, environment pypi.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
